services:
  # openGauss 数据库 (使用官方镜像)
  gaussdb:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/opengauss/opengauss:5.0.0
    container_name: gaussdb
    hostname: gaussdb
    privileged: true
    environment:
      GS_PASSWORD: GaussDB@2024
      GS_DB: movie_db
      GS_PORT: 5432
      GS_HOST_AUTH_METHOD: md5
      OTHER_PG_CONF: "password_encryption_type = 0\npassword_reuse_time = 0"
      LC_ALL: en_US.utf8
      LANG: en_US.utf8
    ports:
      - "5432:5432"
    volumes:
      - gaussdb_data:/var/lib/opengauss/data
    restart: unless-stopped

  # 后端 Flask 应用
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: movie-backend
    environment:
      DB_HOST: gaussdb
      DB_PORT: "5432"
      DB_USER: gaussdb
      DB_PASSWORD: GaussDB@2024
      DB_NAME: movie_db
      SECRET_KEY: cinemo-production-secret-key-2024
    ports:
      - "5000:5000"
    depends_on:
      - gaussdb
    restart: unless-stopped

  # 前端 Vue 应用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: movie-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  gaussdb_data:
