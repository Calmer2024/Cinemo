version: '3.8'

services:
  # GaussDB 数据库 (轻量化配置，适配 4GB 内存服务器)
  gaussdb:
    image: enmotech/opengauss:5.0.0
    container_name: gaussdb
    environment:
      GS_PASSWORD: Gaussdb@2024
      GS_DB: movie_db
    ports:
      - "5432:5432"
    volumes:
      - gaussdb_data:/var/lib/opengauss
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  # 后端 Flask 应用
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: movie-backend
    environment:
      DATABASE_URL: postgresql://gaussdb:Gaussdb@2024@gaussdb:5432/movie_db
      SECRET_KEY: cinemo-production-secret-key-2024
    ports:
      - "5000:5000"
    depends_on:
      - gaussdb
    restart: unless-stopped

  # 前端 Vue 应用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: movie-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  gaussdb_data:
