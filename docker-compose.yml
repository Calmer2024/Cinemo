services:
  # 数据库 (本地开发用 PostgreSQL，华为云部署时替换为 GaussDB)
  gaussdb:
    image: postgres:15-alpine
    container_name: gaussdb
    environment:
      POSTGRES_USER: gaussdb
      POSTGRES_PASSWORD: Gaussdb@123
      POSTGRES_DB: movie_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - gaussdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaussdb -d movie_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 后端 Flask 应用
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: movie-backend
    environment:
      DATABASE_URL: postgresql://gaussdb:gaussdb123@gaussdb:5432/movie_db
      SECRET_KEY: your-production-secret-key-here
    ports:
      - "5000:5000"
    depends_on:
      gaussdb:
        condition: service_healthy

  # 前端 Vue 应用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: movie-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  gaussdb_data:
